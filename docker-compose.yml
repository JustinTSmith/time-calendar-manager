services:
  postgres:
    image: postgres:15-alpine
    container_name: time-calendar-manager-postgres
    environment:
      POSTGRES_DB: tasktime
      POSTGRES_USER: tasktime
      POSTGRES_PASSWORD: tasktime
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tasktime"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: time-calendar-manager-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: time-calendar-manager-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@tasktime.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    profiles:
      - tools
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  redis_data:
  pgadmin_data:
