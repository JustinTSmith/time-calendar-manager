services:
  postgres:
    image: postgres:15
    container_name: time-calendar-manager-postgres
    environment:
      POSTGRES_DB: time_calendar_manager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
